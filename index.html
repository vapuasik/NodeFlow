<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NodeFlow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e0e12; font-family:monospace; overflow:hidden; height:100vh; }
#bar {
  position:fixed; top:0; left:0; right:0; height:48px;
  background:#0e0e12; border-bottom:1px solid #1a1a24;
  display:flex; align-items:center; gap:6px; padding:0 20px; z-index:10;
}
#bar b { color:#fff; font-size:14px; letter-spacing:-0.5px; font-family:'Segoe UI',sans-serif; margin-right:12px; }
button {
  padding:6px 16px; border-radius:20px; border:1px solid #252535;
  background:transparent; color:#666; font-family:'Segoe UI',sans-serif; font-size:12px;
  letter-spacing:0.2px; cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease,border-color .12s,color .12s,background .12s;
  will-change:transform; -webkit-font-smoothing:antialiased;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
}
button:hover { border-color:#7c6fff; color:#bbb; background:#1a1a2a; }
#badd { background:#7c6fff; border-color:#7c6fff; color:#fff; font-weight:600; box-shadow:0 0 16px rgba(124,111,255,0.35); }
#badd:hover { background:#6a5ef0; box-shadow:0 0 20px rgba(124,111,255,0.5); }
#cv { position:fixed; top:48px; left:0; right:0; bottom:0; }
svg { width:100%; height:100%; display:block; }
#ren {
  display:none; position:fixed; z-index:20;
  background:#0e0e12; border:none; border-bottom:1.5px solid #7c6fff;
  color:#fff; font-family:monospace; font-weight:bold; outline:none; padding:0 2px;
}
</style>
</head>
<body>
<div id="bar">
  <b>✦ NodeFlow</b>
  <button id="badd">+ New Node</button>
  <button>Clear</button>
  <button>Fit View</button>
</div>
<div id="cv">
  <svg id="svg">
    <defs>
      <pattern id="dot" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="0.8" fill="#1e1e2a"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dot)"/>
    <g id="EL"></g>
    <g id="NL"></g>
  </svg>
</div>
<input id="ren" type="text">
