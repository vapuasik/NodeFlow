<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NodeFlow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e0e12; font-family:monospace; overflow:hidden; height:100vh; }
#bar {
  position:fixed; top:0; left:0; right:0; height:48px;
  background:#0e0e12; border-bottom:1px solid #1a1a24;
  display:flex; align-items:center; gap:6px; padding:0 20px; z-index:10;
}
#bar b { color:#fff; font-size:14px; letter-spacing:-0.5px; font-family:'Segoe UI',sans-serif; margin-right:12px; }
button {
  padding:6px 16px; border-radius:20px; border:1px solid #252535;
  background:transparent; color:#666; font-family:'Segoe UI',sans-serif; font-size:12px;
  letter-spacing:0.2px; cursor:pointer;
  transition:transform .12s ease,box-shadow .12s ease,border-color .12s,color .12s,background .12s;
  will-change:transform; -webkit-font-smoothing:antialiased;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
}
button:hover { border-color:#7c6fff; color:#bbb; background:#1a1a2a; }
#badd { background:#7c6fff; border-color:#7c6fff; color:#fff; font-weight:600; box-shadow:0 0 16px rgba(124,111,255,0.35); }
#badd:hover { background:#6a5ef0; box-shadow:0 0 20px rgba(124,111,255,0.5); }
#cv { position:fixed; top:48px; left:0; right:0; bottom:0; }
svg { width:100%; height:100%; display:block; }
#ren {
  display:none; position:fixed; z-index:20;
  background:#0e0e12; border:none; border-bottom:1.5px solid #7c6fff;
  color:#fff; font-family:monospace; font-weight:bold; outline:none; padding:0 2px;
}
</style>
</head>
<body>
<div id="bar">
  <b>✦ NodeFlow</b>
  <button id="badd" onclick="addNode()">+ New Node</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="fitView()">Fit View</button>
</div>
<div id="cv">
  <svg id="svg">
    <defs>
      <pattern id="dot" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="0.8" fill="#1e1e2a"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dot)"/>
    <g id="EL"></g>
    <g id="NL"></g>
  </svg>
</div>
<input id="ren" type="text">
<script>
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('svg');
const NL=document.getElementById('NL');
const EL=document.getElementById('EL');
const ren=document.getElementById('ren');
let nodes=[],edges=[],nid=0,eid=0;
let vx=0,vy=0,vs=1;
let dragNode=null,dragOX=0,dragOY=0;
let connFrom=null,connTmp=null;
let panning=false,panOX=0,panOY=0;
let hoveredNode=null,hoveredEdge=null;

function mk(tag,attrs){const el=document.createElementNS(NS,tag);for(const k in attrs)el.setAttribute(k,attrs[k]);return el;}
function applyView(){NL.setAttribute('transform',`translate(${vx},${vy}) scale(${vs})`);EL.setAttribute('transform',`translate(${vx},${vy}) scale(${vs})`);}

function drawNode(nd){
  if(nd.el)nd.el.remove();
  const W=200,PAD=12,H=52;
  const g=mk('g',{});g.style.cursor='move';
  g.appendChild(mk('rect',{x:4,y:4,width:W,height:H,rx:12,fill:'rgba(0,0,0,0.5)',style:'filter:blur(8px)'}));
  const bg=mk('rect',{x:0,y:0,width:W,height:H,rx:12,fill:'#16161e',stroke:'#2e2e40','stroke-width':'1'});
  g.appendChild(bg);
  const tx=mk('text',{x:W/2,y:H/2+5,fill:'#fff','font-size':'13','font-weight':'bold','font-family':'monospace','text-anchor':'middle',style:'user-select:none'});
  tx.textContent=nd.title;g.appendChild(tx);
  const dOut=mk('circle',{cx:W,cy:H/2,r:5,fill:'#1e1e2a',stroke:'#3a3a50','stroke-width':'1',style:'cursor:crosshair'});
  const dIn=mk('circle',{cx:0,cy:H/2,r:5,fill:'#1e1e2a',stroke:'#3a3a50','stroke-width':'1',style:'cursor:crosshair'});
  g.appendChild(dOut);g.appendChild(dIn);
  nd.w=W;nd.h=H;nd.el=g;
  g.setAttribute('transform',`translate(${nd.x},${nd.y})`);
  NL.appendChild(g);
  [dOut,dIn].forEach(d=>{
    d.addEventListener('mouseenter',()=>{d.setAttribute('fill','#7c6fff');d.setAttribute('stroke','#7c6fff');});
    d.addEventListener('mouseleave',()=>{d.setAttribute('fill','#1e1e2a');d.setAttribute('stroke','#3a3a50');});
  });
  g.addEventListener('mouseenter',()=>{hoveredNode=nd;bg.setAttribute('stroke','#7c6fff');bg.setAttribute('filter','drop-shadow(0 0 6px rgba(124,111,255,0.3))');});
  g.addEventListener('mouseleave',()=>{hoveredNode=null;bg.setAttribute('stroke','#2e2e40');bg.removeAttribute('filter');});
  g.addEventListener('mousedown',ev=>{
    if(ev.target===dOut||ev.target===dIn)return;
    ev.stopPropagation();
    dragNode=nd;dragOX=ev.clientX/vs-nd.x;dragOY=ev.clientY/vs-nd.y;
  });
  dOut.addEventListener('mousedown',ev=>{ev.stopPropagation();connFrom=nd;});
  dIn.addEventListener('mouseup',()=>{
    if(!connFrom||connFrom.id===nd.id)return;
    if(!edges.find(e=>e.f===connFrom.id&&e.t===nd.id)){
      const edge={id:eid++,f:connFrom.id,t:nd.id,el:null};edges.push(edge);drawEdge(edge);
    }
  });
  tx.addEventListener('mousedown',ev=>{
    ev.stopPropagation();
    dragNode=nd;dragOX=ev.clientX/vs-nd.x;dragOY=ev.clientY/vs-nd.y;
  });
  tx.addEventListener('dblclick',ev=>{
    ev.stopPropagation();dragNode=null;
    const svgR=svg.getBoundingClientRect();
    const sx=nd.x*vs+vx+PAD*vs+svgR.left;
    const sy=nd.y*vs+vy+(H/2-8)*vs+svgR.top;
    ren.style.display='block';ren.style.left=sx+'px';ren.style.top=sy+'px';
    ren.style.width=(W*vs-PAD*2*vs)+'px';ren.style.fontSize=(13*vs)+'px';
    ren.value=nd.title;ren._nd=nd;ren.focus();ren.select();
  });
}

function commitRename(){
  const nd=ren._nd;if(!nd)return;
  nd.title=ren.value.trim()||nd.title;
  ren.style.display='none';ren._nd=null;
  drawNode(nd);redrawEdges(nd.id);
}
ren.addEventListener('blur',commitRename);
ren.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key==='Escape'){ev.preventDefault();ren.blur();}});

function drawEdge(edge){
  if(edge.el)edge.el.remove();
  const f=nodes.find(n=>n.id===edge.f),t=nodes.find(n=>n.id===edge.t);
  if(!f||!t)return;
  const x1=f.x+f.w,y1=f.y+f.h/2,x2=t.x,y2=t.y+t.h/2,mx=(x1+x2)/2;
  const hit=mk('path',{d:`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`,fill:'none',stroke:'transparent','stroke-width':'12',style:'cursor:pointer'});
  const p=mk('path',{d:`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`,fill:'none',stroke:'#2a2a3a','stroke-width':'1.5',style:'pointer-events:none'});
  hit.addEventListener('mouseenter',()=>{hoveredEdge=edge;p.setAttribute('stroke','#7c6fff');p.setAttribute('stroke-width','2');});
  hit.addEventListener('mouseleave',()=>{if(hoveredEdge===edge)hoveredEdge=null;p.setAttribute('stroke','#2a2a3a');p.setAttribute('stroke-width','1.5');});
  const g=mk('g',{});g.appendChild(hit);g.appendChild(p);EL.appendChild(g);
  edge.el=g;
}
function redrawEdges(id){edges.filter(e=>e.f===id||e.t===id).forEach(drawEdge);}

svg.addEventListener('mousedown',ev=>{
  if(ev.target===svg||ev.target.getAttribute('fill')==='url(#dot)'){panning=true;panOX=ev.clientX-vx;panOY=ev.clientY-vy;}
});
window.addEventListener('mousemove',ev=>{
  if(dragNode){
    dragNode.x=ev.clientX/vs-dragOX;dragNode.y=ev.clientY/vs-dragOY;
    dragNode.el.setAttribute('transform',`translate(${dragNode.x},${dragNode.y})`);redrawEdges(dragNode.id);
  } else if(connFrom){
    if(connTmp)connTmp.remove();
    const r=svg.getBoundingClientRect();
    const x1=connFrom.x+connFrom.w,y1=connFrom.y+connFrom.h/2;
    const x2=(ev.clientX-r.left-vx)/vs,y2=(ev.clientY-r.top-vy)/vs;
    connTmp=mk('path',{d:`M${x1} ${y1} C${(x1+x2)/2} ${y1} ${(x1+x2)/2} ${y2} ${x2} ${y2}`,fill:'none',stroke:'#7c6fff','stroke-width':'1.5','stroke-dasharray':'4 3'});
    EL.appendChild(connTmp);
  } else if(panning){vx=ev.clientX-panOX;vy=ev.clientY-panOY;applyView();}
});
window.addEventListener('mouseup',ev=>{
  if(connTmp){connTmp.remove();connTmp=null;}
  if(connFrom){
    const r=svg.getBoundingClientRect();
    const mx=(ev.clientX-r.left-vx)/vs,my=(ev.clientY-r.top-vy)/vs;
    let best=null;
    nodes.forEach(nd=>{if(nd.id!==connFrom.id&&mx>=nd.x&&mx<=nd.x+nd.w&&my>=nd.y&&my<=nd.y+nd.h)best=nd;});
    if(best&&!edges.find(e=>e.f===connFrom.id&&e.t===best.id)){
      const edge={id:eid++,f:connFrom.id,t:best.id,el:null};edges.push(edge);drawEdge(edge);
    }
  }
  dragNode=null;connFrom=null;panning=false;
});
svg.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const f=ev.deltaY>0?0.9:1.1,r=svg.getBoundingClientRect();
  const mx=ev.clientX-r.left,my=ev.clientY-r.top;
  vx=mx-(mx-vx)*f;vy=my-(my-vy)*f;vs*=f;applyView();
},{passive:false});

function addNode(){
  const r=svg.getBoundingClientRect();
  const x=(r.width/2-vx)/vs+(Math.random()*60-30);
  const y=(r.height/2-vy)/vs+(Math.random()*60-30);
  const nd={id:nid++,x,y,title:'node_'+nid,w:200,h:52,el:null};
  nodes.push(nd);drawNode(nd);
}
function clearAll(){NL.innerHTML='';EL.innerHTML='';nodes=[];edges=[];}
function fitView(){
  if(!nodes.length)return;
  const r=svg.getBoundingClientRect();
  const mnx=Math.min(...nodes.map(n=>n.x)),mxx=Math.max(...nodes.map(n=>n.x+n.w));
  const mny=Math.min(...nodes.map(n=>n.y)),mxy=Math.max(...nodes.map(n=>n.y+n.h));
  vs=Math.min(r.width/(mxx-mnx+120),r.height/(mxy-mny+120),1.4);
  vx=(r.width-(mxx-mnx)*vs)/2-mnx*vs+60*vs;
  vy=(r.height-(mxy-mny)*vs)/2-mny*vs+60*vs;
  applyView();
}
function deleteNodeById(id){
  edges=edges.filter(e=>{if(e.f===id||e.t===id){if(e.el)e.el.remove();return false;}return true;});
  const nd=nodes.find(n=>n.id===id);if(nd&&nd.el)nd.el.remove();
  nodes=nodes.filter(n=>n.id!==id);hoveredNode=null;
}
document.addEventListener('keydown',ev=>{
  if(ev.key==='Backspace'||ev.key==='Delete'){
    if(ren.style.display==='block')return;
    if(hoveredEdge){if(hoveredEdge.el)hoveredEdge.el.remove();edges=edges.filter(e=>e.id!==hoveredEdge.id);hoveredEdge=null;}
    else if(hoveredNode)deleteNodeById(hoveredNode.id);
  }
});
document.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('mousemove',ev=>{
    const r=btn.getBoundingClientRect();
    const dx=(ev.clientX-r.left-r.width/2)/(r.width/2),dy=(ev.clientY-r.top-r.height/2)/(r.height/2);
    btn.style.transform=`perspective(400px) rotateX(${-dy*18}deg) rotateY(${dx*18}deg) scale(1.08) translateZ(8px)`;
    btn.style.boxShadow=`${-dx*8}px ${-dy*8}px 24px rgba(124,111,255,0.4)`;
  });
  btn.addEventListener('mouseleave',()=>{btn.style.transform='';btn.style.boxShadow=btn.id==='badd'?'0 0 16px rgba(124,111,255,0.35)':'';});
  btn.addEventListener('mousedown',()=>{btn.style.transform='perspective(400px) scale(0.95)';});
  btn.addEventListener('mouseup',()=>{btn.style.transform='perspective(400px) scale(1.05)';});
});
function mknd(x,y,t){const nd={id:nid++,x,y,title:t,w:200,h:52,el:null};nodes.push(nd);drawNode(nd);return nd;}
const a=mknd(60,160,'getDetails'),b=mknd(360,60,'#getPublicDetails'),c=mknd(360,280,'Service Detector'),d=mknd(660,60,'Распознанный путь'),ee=mknd(660,280,'https://api.example.com');
setTimeout(()=>{[{f:a.id,t:b.id},{f:a.id,t:c.id},{f:b.id,t:d.id},{f:c.id,t:ee.id}].forEach(x=>{const edge={id:eid++,...x,el:null};edges.push(edge);drawEdge(edge);});fitView();},30);
</script>
</body>
</html>
